<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jack's Gym Tracker — History</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <div style="flex: 1;">
          <h1 style="margin: 0; font-size: 1.5rem;">💪 Jack's Gym Tracker</h1>
        </div>
        <a href="/">Dashboard</a>
        <a href="/log.html" style="opacity: 0.4; pointer-events: none;">Log Workout</a>
        <a href="/tips.html">Form Tips</a>
        <a href="/history.html" class="active">History</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1>Workout History</h1>
      <p>All your past gym sessions</p>

      <div style="background: #e8f4f8; border-left: 4px solid #0066cc; padding: 1rem; margin-bottom: 2rem; border-radius: 4px;">
        <p style="margin: 0; color: #0066cc;">
          <strong>Export your data:</strong> Need to download all your workouts as a CSV file?
          <a href="/data/export.html" style="color: #0066cc; font-weight: 600; text-decoration: none;">Click here to export →</a>
        </p>
      </div>

      <div id="sessionsContainer"></div>
    </div>
  </main>

  <footer>
    <p>Jack's Gym Tracker • Hosted on Vercel • Data synced with Google Sheets</p>
  </footer>

  <script src="/config.js"></script>
  <script src="/data.js"></script>
  <script>
    let locations = {};

    function toggleLocation(date, event) {
      event.stopPropagation();
      // Toggle is visual-only; to persist changes edit data/locations.json in the repo
      const current = locations[date] || 'gym';
      locations[date] = current === 'gym' ? 'home' : 'gym';
      const badge = document.getElementById(`loc-${CSS.escape(date)}`);
      if (badge) applyBadge(badge, locations[date]);
    }

    function applyBadge(el, location) {
      if (location === 'home') {
        el.textContent = '🏠 Home';
        el.style.background = '#e8f5e9';
        el.style.color = '#2e7d32';
        el.style.borderColor = '#a5d6a7';
      } else {
        el.textContent = '🏋️ Gym';
        el.style.background = '#e3f0ff';
        el.style.color = '#0066cc';
        el.style.borderColor = '#90bef0';
      }
    }

    async function loadHistory() {
      await initializeData();

      try {
        const res = await fetch('/data/locations.json');
        locations = await res.json();
      } catch { locations = {}; }

      const sessions = getSessions();
      const container = document.getElementById('sessionsContainer');

      if (sessions.length === 0) {
        container.innerHTML = '<div class="card"><p style="color: var(--text-secondary); text-align: center;">No sessions logged yet</p></div>';
        return;
      }

      const html = sessions.map((session, index) => {
        const volume = session.exercises.reduce((sum, ex) => sum + calculateVolume(ex), 0);
        const location = locations[session.date] || 'gym';

        const exercisesHtml = session.exercises.map(ex => `
          <div class="exercise-in-session">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
              <div>
                <div style="font-weight: 600; color: var(--accent);">${ex.exercise}</div>
                <div style="font-size: 0.85rem; color: var(--text-secondary);">${ex.muscles}</div>
              </div>
              <div style="text-align: right;">
                <div style="font-weight: 600; color: var(--accent);">${calculateVolume(ex).toFixed(0)}</div>
                <div style="font-size: 0.85rem; color: var(--text-secondary);">volume</div>
              </div>
            </div>
            <div style="font-size: 0.9rem; color: var(--text-secondary);">
              ${ex.sets.map(s => `<span style="display: inline-block; margin-right: 0.75rem;"><strong>${s.weight}</strong> kg × <strong>${s.reps}</strong></span>`).join('')}
            </div>
            ${ex.formNotes ? `<div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; font-style: italic;">"${ex.formNotes}"</div>` : ''}
          </div>
        `).join('');

        return `
          <div class="session" id="session-${index}">
            <div class="session-header" onclick="toggleSession(${index})">
              <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;">
                <div>
                  <div class="session-date">${formatDate(session.date)}</div>
                  <div class="session-meta">
                    <span>${session.exercises.length} exercises</span>
                    <span style="color: var(--accent); font-weight: 600;">${formatNumber(volume)} volume</span>
                  </div>
                </div>
                <span id="loc-${session.date}" onclick="toggleLocation('${session.date}', event)"
                  style="cursor: pointer; font-size: 0.8rem; font-weight: 600; padding: 0.2rem 0.6rem; border-radius: 999px; border: 1px solid; white-space: nowrap; user-select: none;"></span>
              </div>
              <div style="color: var(--text-secondary); font-size: 1.5rem;">▼</div>
            </div>
            <div class="session-body">
              ${exercisesHtml}
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = html;

      // Apply badge styles after render
      sessions.forEach(session => {
        const loc = locations[session.date] || 'gym';
        const badge = document.getElementById(`loc-${session.date}`);
        if (badge) applyBadge(badge, loc);
      });
    }

    function toggleSession(index) {
      const session = document.getElementById(`session-${index}`);
      session.classList.toggle('expanded');
    }

    // Load on page load
    document.addEventListener('DOMContentLoaded', loadHistory);
  </script>
</body>
</html>
